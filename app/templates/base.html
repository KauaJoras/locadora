<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Locadora{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/retro.css') }}">
</head>
<body>
<canvas id="starCanvas"></canvas>

<div class="crt-tv-container">
  <div class="crt-bezel">
    <div class="crt-screen">
      <div class="content">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="flash-stack">
              {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const starColors = ['#c8e8ff','#ffffff','#ffe87a','#ff7a7a','#7affb4','#a0c8ff','#ffb87a','#d4a0ff','#7affff'];
const stars = Array.from({length: 280}, () => {
  const s = Math.random();
  return { x: Math.random(), y: Math.random() * 0.88, r: s < 0.6 ? 0.5 : s < 0.85 ? 1 : 2,
    color: starColors[Math.floor(Math.random() * starColors.length)],
    type: s < 0.7 ? 'dot' : s < 0.9 ? 'plus' : 'glow',
    speed: 0.3 + Math.random() * 1.2, offset: Math.random() * Math.PI * 2 };
});

let t = 0;
function draw() {
  const w = canvas.width, h = canvas.height; t += 0.016;
  const g = ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#16142a'); g.addColorStop(0.6,'#1c1930'); g.addColorStop(1,'#231f38');
  ctx.fillStyle = g; ctx.fillRect(0,0,w,h);

  stars.forEach(s => {
    const px = s.x*w, py = s.y*h, a = 0.5 + 0.5*Math.sin(t*s.speed+s.offset);
    ctx.globalAlpha = a; ctx.fillStyle = s.color;
    if (s.type==='dot') { ctx.fillRect(~~px,~~py,s.r,s.r); }
    else if (s.type==='plus') {
      ctx.fillRect(~~px-2,~~py,4,1); ctx.fillRect(~~px,~~py-2,1,4);
    } else {
      ctx.globalAlpha=a*0.3; ctx.beginPath(); ctx.arc(px,py,4,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=a; ctx.fillRect(~~px-1,~~py-1,3,3);
      ctx.fillRect(~~px-3,~~py,6,1); ctx.fillRect(~~px,~~py-3,1,6);
    }
    ctx.globalAlpha=1;
  });

  // Solo pixel
  const gy = h*0.88;
  ctx.fillStyle='#e8b4a8'; ctx.fillRect(0,gy,w,h);
  [[0,.06,12],[ .15,.10,16],[.42,.12,18],[.65,.08,14],[.82,.14,22]].forEach(([x,ww,hh])=>{
    ctx.fillStyle='#c89080'; ctx.fillRect(~~(x*w),~~(gy-hh*0.6),~~(ww*w),hh);
  });
  ctx.fillStyle='#8a7068';
  [[.04,.05],[.33,.07],[.62,.06],[.78,.09]].forEach(([x,ww])=>{
    ctx.fillRect(~~(x*w),~~(gy+3),~~(ww*w),5);
  });
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
